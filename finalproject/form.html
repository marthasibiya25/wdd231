<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GameVault | Feedback Form</title>

    <meta name="description" content="Send feedback about GameVault games and suggest improvements.">
    <meta name="author" content="Martha Sibiya">

    <link rel="icon" href="images/favicon.webp" type="image/webp">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/responsive.css">

    <meta property="og:title" content="GameVault | Feedback Form">
    <meta property="og:description" content="Share your feedback and help improve GameVault.">
    <meta property="og:image" content="https://marthasibiya25.github.io/wdd231/finalproject/images/gamevault.jpg">
    <meta property="og:url" content="https://marthasibiya25.github.io/wdd231/finalproject/form.html">

    <script type="module" src="scripts/main.js" defer></script>
</head>

<body>

    <header>
        <h1>Feedback</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="games.html">Games</a>
            <a href="form.html">Feedback</a>
            <a href="attributions.html">Attributions</a>
        </nav>
    </header>

    <main>

        <section>
            <h2>Send Feedback</h2>

            <form action="#" method="post">

                <label>Name:</label>
                <input type="text" required>

                <label>Email:</label>
                <input type="email" required>

                <label>Favorite Game:</label>
                <input type="text">

                <label>Message:</label>
                <textarea rows="5" required></textarea>

                <button type="submit">Submit</button>

            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 GameVault | Martha Sibiya</p>
    </footer>

</body>

</html>
